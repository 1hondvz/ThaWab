<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thawab - الرئيسية</title>
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); 
            min-height: 100vh; 
            min-height: 100dvh; 
            color: #e2e8f0;
            overflow-y: scroll;
            padding-top: 80px; /* space for fixed header */
            position: relative;
        }

        /* Floating background icons */
        .floating-icons { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .icon { position: absolute; font-size: 2rem; opacity: 0.08; animation: float 6s ease-in-out infinite; color: #6c5ce7; }
        .icon:nth-child(odd) { animation-direction: alternate; }
        .icon:nth-child(1) { top: 15%; left: 8%; animation-delay: -1s; }
        .icon:nth-child(2) { top: 45%; right: 12%; animation-delay: -3s; }
        .icon:nth-child(3) { bottom: 25%; left: 10%; animation-delay: -5s; }
        .icon:nth-child(4) { bottom: 15%; right: 8%; animation-delay: -2s; }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }

        /* Header Styling */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(30, 30, 60, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(108, 92, 231, 0.25);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 30%;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 250px;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 2.5rem 0.6rem 1rem;
            border: 2px solid #2d3748;
            border-radius: 20px;
            font-size: 0.9rem;
            background: #1a202c;
            color: #e2e8f0;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: #6c5ce7;
            background: #2d3748;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.3);
        }

        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #718096;
            font-size: 1rem;
            pointer-events: none;
        }

        .header-center {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30%;
        }

        .logo {
            font-family: 'Outfit', 'Cairo', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .header-left {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1rem;
            width: 30%;
        }

        .logout-btn {
            background: rgba(220, 53, 69, 0.1);
            color: #ff7675;
            border: 1px solid rgba(220, 53, 69, 0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.85);
            color: white;
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
            transform: translateY(-2px);
        }

        .settings-btn {
            background: rgba(108, 92, 231, 0.1);
            color: #a29bfe;
            border: 1px solid rgba(108, 92, 231, 0.3);
            padding: 0.6rem 0.9rem;
            border-radius: 20px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            background: rgba(108, 92, 231, 0.3);
            transform: rotate(60deg);
        }

        /* Settings Modal */
        .settings-modal .modal-content {
            max-width: 360px;
            padding: 1.5rem;
        }

        .settings-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(108,92,231,0.15);
            border-radius: 10px;
            padding: 0.8rem;
            margin-bottom: 0.7rem;
        }

        .settings-section-title {
            color: #a29bfe;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .settings-section .form-group {
            margin-bottom: 0.5rem;
        }

        .settings-section input {
            padding: 0.6rem 0.8rem;
            font-size: 0.85rem;
        }

        .settings-section .modal-btn {
            padding: 0.55rem;
            font-size: 0.85rem;
        }

        .user-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .user-badge.admin {
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            border: 1px solid rgba(46,204,113,0.3);
        }

        .user-badge.member {
            background: rgba(108,92,231,0.15);
            color: #a29bfe;
            border: 1px solid rgba(108,92,231,0.3);
        }

        .danger-btn {
            width: 100%;
            padding: 0.6rem;
            background: rgba(220,53,69,0.1);
            color: #ff7675;
            border: 1px solid rgba(220,53,69,0.3);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }

        .danger-btn:hover {
            background: rgba(220,53,69,0.85);
            color: white;
        }

        .admin-btn {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.4);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: none; /* hidden by default, shown for admin in javascript */
            align-items: center;
            gap: 0.5rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .admin-btn:hover {
            background: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            transform: translateY(-2px);
        }

        .delete-btn {
            display: none;
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(220, 53, 69, 0.85);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 20;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #dc3545;
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.5);
            transform: scale(1.05);
        }

        .edit-btn {
            display: none;
            position: absolute;
            top: 10px;
            left: 90px;
            background: rgba(108, 92, 231, 0.85);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 20;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            background: #6c5ce7;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.5);
            transform: scale(1.05);
        }

        .admin-mode .delete-btn,
        .admin-mode .edit-btn {
            display: block;
        }

        .video-card {
            position: relative;
        }

        /* Main feed container */
        .feed-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            position: relative;
            z-index: 10;
        }

        /* Video Card Styling */
        .video-card {
            background: rgba(30, 30, 60, 0.75);
            border-radius: 24px;
            border: 1px solid rgba(108, 92, 231, 0.25);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            margin-bottom: 2.5rem;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(108, 92, 231, 0.2);
            border-color: rgba(108, 92, 231, 0.4);
        }

        /* Card Header */
        .card-header {
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .publisher-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .publisher-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }

        .publisher-name {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
        }

        .post-time {
            font-size: 0.8rem;
            color: #a0aec0;
            display: block;
        }

        /* Video cover wrapper (Thumbnail) */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(108, 92, 231, 0.1);
            border-bottom: 1px solid rgba(108, 92, 231, 0.1);
            overflow: hidden;
        }

        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .video-card:hover .video-thumbnail {
            transform: scale(1.05);
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease;
            z-index: 5;
        }

        .video-card:hover .video-overlay {
            background: rgba(0, 0, 0, 0.2);
        }

        .play-icon {
            font-size: 3.5rem;
            color: white;
            background: rgba(108, 92, 231, 0.85);
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-right: 5px;
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.5);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .video-card:hover .play-icon {
            transform: scale(1.15);
            background: #6c5ce7;
        }

        /* Description Area */
        .description-section {
            padding: 1.5rem;
        }

        .video-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.6rem;
            transition: color 0.3s ease;
        }

        .video-card:hover .video-title {
            color: #a29bfe;
        }

        .video-description {
            font-size: 0.95rem;
            color: #cbd5e0;
            line-height: 1.6;
        }

        /* No search results */
        .no-results {
            text-align: center;
            padding: 3rem;
            background: rgba(30, 30, 60, 0.5);
            border-radius: 20px;
            border: 1px dashed rgba(108, 92, 231, 0.3);
        }

        /* Modal Overlay Styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 35, 0.85);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 1rem;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: rgba(30, 30, 60, 0.95);
            border: 1px solid rgba(108, 92, 231, 0.35);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: right;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #a29bfe;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e0;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #2d3748;
            border-radius: 10px;
            font-size: 0.95rem;
            background: #1a202c;
            color: #e2e8f0;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #6c5ce7;
            background: #2d3748;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.3);
        }

        .form-group textarea {
            height: 100px;
            resize: none;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .modal-btn.save {
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            color: white;
        }

        .modal-btn.save:hover {
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
            filter: brightness(1.1);
        }

        .modal-btn.cancel {
            background: #2d3748;
            color: #a0aec0;
            border: 1px solid #4a5568;
        }

        .modal-btn.cancel:hover {
            background: #4a5568;
            color: white;
        }

        /* Responsive styling */
        @media (max-width: 768px) {
            header {
                padding: 0 1rem;
            }
            .header-right {
                width: 40%;
            }
            .header-left {
                width: 35%;
            }
            .logo {
                font-size: 1.8rem;
            }
            .logout-btn, .admin-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            header {
                height: 60px;
            }
            body {
                padding-top: 70px;
            }
            .logo {
                font-size: 1.4rem;
            }
            .search-container {
                max-width: 110px;
            }
            .search-input {
                padding: 0.4rem 1.8rem 0.4rem 0.6rem;
                font-size: 0.75rem;
            }
            .search-icon {
                right: 8px;
                font-size: 0.8rem;
            }
            .logout-btn span, .admin-btn span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="floating-icons">
        <div class="icon">✨</div>
        <div class="icon">💫</div>
        <div class="icon">🌟</div>
        <div class="icon">🕌</div>
    </div>

    <!-- Header bar representing Top Menu -->
    <header>
        <!-- Right side: Search bar -->
        <div class="header-right">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="بحث عن مقاطع قرآنية..." onkeyup="handleSearch(event)">
            </div>
        </div>

        <!-- Center: Website Name "Thawab" -->
        <div class="header-center">
            <div class="logo" onclick="resetSearch()">Thawab</div>
        </div>

        <!-- Left side: Admin button & Log Out button -->
        <div class="header-left">
            <button class="admin-btn" id="adminBtn" onclick="openAddVideoModal()">
                <span>➕</span> إضافة مقطع
            </button>
            <button class="settings-btn" onclick="openSettingsModal()">
                <span>⚙️</span>
            </button>
            <button class="logout-btn" onclick="handleLogout()">
                <span>🚪</span> تسجيل الخروج
            </button>
        </div>
    </header>

    <!-- Main video feed list -->
    <div class="feed-container" id="videoFeed">
        <!-- Rendered dynamically by javascript -->
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay settings-modal" id="settingsModal">
        <div class="modal-content" style="max-width:340px;padding:1.2rem;">
            <h3 class="modal-title" style="font-size:1.1rem;margin-bottom:1rem;">⚙️ الإعدادات</h3>

            <!-- معلومات الحساب -->
            <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.03);border:1px solid rgba(108,92,231,0.15);border-radius:10px;padding:0.7rem 1rem;margin-bottom:0.8rem;">
                <span class="user-badge" id="settingsRoleBadge">member</span>
                <div style="text-align:right;">
                    <div style="color:#fff;font-weight:700;font-size:0.95rem;" id="settingsUsername">-</div>
                    <div style="color:#718096;font-size:0.75rem;">الحساب الحالي</div>
                </div>
            </div>

            <!-- Tabs -->
            <div style="display:flex;gap:0.5rem;margin-bottom:0.8rem;">
                <button onclick="switchTab('name')" id="tab-name" style="flex:1;padding:0.5rem;border-radius:8px;border:1px solid rgba(108,92,231,0.4);background:rgba(108,92,231,0.2);color:#a29bfe;font-family:'Cairo',sans-serif;font-size:0.8rem;cursor:pointer;font-weight:700;">✏️ الاسم</button>
                <button onclick="switchTab('pass')" id="tab-pass" style="flex:1;padding:0.5rem;border-radius:8px;border:1px solid rgba(45,55,72,1);background:transparent;color:#718096;font-family:'Cairo',sans-serif;font-size:0.8rem;cursor:pointer;font-weight:700;">🔒 الباسورد</button>
                <button onclick="switchTab('danger')" id="tab-danger" style="flex:1;padding:0.5rem;border-radius:8px;border:1px solid rgba(45,55,72,1);background:transparent;color:#718096;font-family:'Cairo',sans-serif;font-size:0.8rem;cursor:pointer;font-weight:700;">⚠️ الحذف</button>
            </div>

            <!-- Tab: تغيير الاسم -->
            <div id="tabContent-name">
                <input type="text" id="newUsername" placeholder="الاسم الجديد" style="width:100%;padding:0.7rem;border:2px solid #2d3748;border-radius:10px;font-size:0.9rem;background:#1a202c;color:#e2e8f0;margin-bottom:0.6rem;font-family:'Cairo',sans-serif;">
                <button class="modal-btn save" style="width:100%;padding:0.7rem;font-size:0.9rem;" onclick="changeUsername()">تغيير الاسم</button>
            </div>

            <!-- Tab: تغيير كلمة المرور -->
            <div id="tabContent-pass" style="display:none;">
                <input type="password" id="currentPassword" placeholder="كلمة المرور الحالية" style="width:100%;padding:0.7rem;border:2px solid #2d3748;border-radius:10px;font-size:0.9rem;background:#1a202c;color:#e2e8f0;margin-bottom:0.6rem;font-family:'Cairo',sans-serif;">
                <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة" style="width:100%;padding:0.7rem;border:2px solid #2d3748;border-radius:10px;font-size:0.9rem;background:#1a202c;color:#e2e8f0;margin-bottom:0.6rem;font-family:'Cairo',sans-serif;">
                <button class="modal-btn save" style="width:100%;padding:0.7rem;font-size:0.9rem;" onclick="changePassword()">تغيير كلمة المرور</button>
            </div>

            <!-- Tab: الحذف -->
            <div id="tabContent-danger" style="display:none;">
                <p style="color:#a0aec0;font-size:0.85rem;margin-bottom:0.8rem;text-align:center;">سيتم حذف حسابك نهائياً ولا يمكن التراجع.</p>
                <button class="danger-btn" onclick="deleteAccount()">🗑 حذف الحساب نهائياً</button>
            </div>

            <button class="modal-btn cancel" style="width:100%;padding:0.6rem;margin-top:0.8rem;font-size:0.85rem;" onclick="closeSettingsModal()">إغلاق</button>
        </div>
    </div>

    <!-- Edit Video Modal (Admin Only) -->
    <div class="modal-overlay" id="editVideoModal">
        <div class="modal-content">
            <h3 class="modal-title">تعديل المقطع</h3>
            <input type="hidden" id="editVideoId">
            <div class="form-group">
                <label for="editTitle">عنوان المقطع</label>
                <input type="text" id="editTitle" placeholder="العنوان">
            </div>
            <div class="form-group">
                <label for="editDesc">الوصف</label>
                <textarea id="editDesc" placeholder="الوصف"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeEditModal()">إلغاء</button>
                <button class="modal-btn save" onclick="saveEditVideo()">حفظ التعديل</button>
            </div>
        </div>
    </div>

    <!-- Add Video Modal (Admin Only) -->
    <div class="modal-overlay" id="addVideoModal">
        <div class="modal-content">
            <h3 class="modal-title">إضافة مقطع قرآن كريم جديد</h3>

            <!-- نوع الإضافة -->
            <div class="form-group" id="fileUploadGroup">
                <label for="directUrl">لينك الملف (mp3 / mp4)</label>
                <input type="url" id="directUrl" placeholder="https://res.cloudinary.com/...">
                <p style="color:#718096;font-size:0.8rem;margin-top:0.4rem;">ارفع الملف على Cloudinary وحط اللينك هنا</p>
            </div>


            <div class="form-group">
                <label for="ytTitle">عنوان المقطع</label>
                <input type="text" id="ytTitle" placeholder="مثال: سورة البقرة - الشيخ ماهر المعيقلي">
            </div>

            <div class="form-group">
                <label for="ytDesc">الوصف</label>
                <textarea id="ytDesc" placeholder="أدخل تفاصيل التلاوة والشيخ القارئ..."></textarea>
            </div>

            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeAddVideoModal()">إلغاء</button>
                <button class="modal-btn save" id="saveBtn" onclick="saveNewVideo()">حفظ المقطع</button>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = 'https://habbo-login-default-rtdb.firebaseio.com';

        let videosData = [];

        // Load videos from Firebase
        async function initVideos() {
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = '<div style="text-align:center;padding:3rem;color:#a0aec0;">⏳ جاري تحميل المقاطع...</div>';
            try {
                const res = await fetch(`${FIREBASE_URL}/videos.json`);
                const data = await res.json();
                if (data) {
                    videosData = Object.entries(data).map(([key, val]) => ({ ...val, firebaseKey: key })).reverse();
                } else {
                    videosData = [];
                }
            } catch(e) {
                videosData = [];
                showToast('تعذر تحميل المقاطع! ⚠️');
            }
            renderVideos();
        }

        // Render function
        function renderVideos(filterText = '') {
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = '';
            
            const filtered = videosData.filter(v => 
                v.title.toLowerCase().includes(filterText.toLowerCase()) || 
                v.description.toLowerCase().includes(filterText.toLowerCase()) ||
                v.publisher.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filtered.length === 0) {
                feed.innerHTML = `
                    <div class="no-results">
                        <span style="font-size: 3rem;">🔍</span>
                        <p style="margin-top: 1rem; color: #b2bec3;">لم يتم العثور على أي مقاطع تطابق بحثك.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => {
                    window.location.href = `video.html?id=${encodeURIComponent(video.id)}`;
                };

                // Thumbnail
                let thumbHtml = '';
                if (video.type === 'audio') {
                    thumbHtml = `<div class="video-container" style="background:#1a1a2e;display:flex;justify-content:center;align-items:center;">
                        <span style="font-size:4rem;">🎵</span>
                        <div class="video-overlay"><span class="play-icon">▶</span></div>
                    </div>`;
                } else if (video.type === 'video') {
                    thumbHtml = `<div class="video-container" style="background:#000;display:flex;justify-content:center;align-items:center;">
                        <span style="font-size:4rem;">🎬</span>
                        <div class="video-overlay"><span class="play-icon">▶</span></div>
                    </div>`;
                } else {
                    thumbHtml = `<div class="video-container">
                        <img class="video-thumbnail" src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg" alt="${video.title}">
                        <div class="video-overlay"><span class="play-icon">▶</span></div>
                    </div>`;
                }

                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteVideo('${video.id}', event)">🗑 حذف</button>
                    <button class="edit-btn" onclick="openEditModal('${video.id}', event)">✏️ تعديل</button>
                    <div class="card-header">
                        <div class="publisher-info">
                            <span class="publisher-avatar">${video.avatar}</span>
                            <div>
                                <h3 class="publisher-name">${video.publisher}</h3>
                                <span class="post-time">${video.time}</span>
                            </div>
                        </div>
                    </div>
                    ${thumbHtml}
                    <div class="description-section">
                        <h2 class="video-title">${video.title}</h2>
                        <p class="video-description">${video.description}</p>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // Search logic
        function handleSearch(event) {
            const query = event.target.value;
            renderVideos(query);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            renderVideos('');
        }

        function toggleUploadType() {}

        // Modal triggers
        function openAddVideoModal() {
            document.getElementById('addVideoModal').classList.add('active');
        }

        function closeAddVideoModal() {
            document.getElementById('addVideoModal').classList.remove('active');
            document.getElementById('ytTitle').value = '';
            document.getElementById('ytDesc').value = '';
            document.getElementById('directUrl').value = '';
        }

        // YouTube URL id extractor
        function getYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Save new video handler
        async function saveNewVideo() {
            const titleVal = document.getElementById('ytTitle').value.trim();
            const descVal = document.getElementById('ytDesc').value.trim();
            const directUrl = document.getElementById('directUrl').value.trim();

            if (!titleVal || !descVal || !directUrl) {
                showToast('يرجى ملء جميع الحقول! ⚠️');
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'جارٍ الحفظ...';

            const fileType = directUrl.match(/\.(mp3|ogg|wav|aac)(\?|$)/i) ? 'audio' : 'video';
            await addVideoToList({ type: fileType, url: directUrl, id: 'direct_' + Date.now(), title: titleVal, description: descVal });

            showToast('تمت إضافة المقطع بنجاح! 🕌');
            closeAddVideoModal();
            renderVideos();
            saveBtn.disabled = false;
            saveBtn.textContent = 'حفظ المقطع';
        }

        async function addVideoToList(videoData) {
            const newVideo = {
                ...videoData,
                publisher: "إدارة موقع ثواب",
                avatar: "🕌",
                time: new Date().toLocaleDateString('ar-EG')
            };
            try {
                const res = await fetch(`${FIREBASE_URL}/videos.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newVideo)
                });
                const result = await res.json();
                newVideo.firebaseKey = result.name;
                videosData.unshift(newVideo);
            } catch(e) {
                showToast('فشل حفظ المقطع! ⚠️');
            }
        }

        // Edit video functions
        function openEditModal(videoId, event) {
            event.stopPropagation();
            const video = videosData.find(v => v.id === videoId);
            if (!video) return;
            document.getElementById('editVideoId').value = videoId;
            document.getElementById('editTitle').value = video.title;
            document.getElementById('editDesc').value = video.description;
            document.getElementById('editVideoModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editVideoModal').classList.remove('active');
        }

        async function saveEditVideo() {
            const videoId = document.getElementById('editVideoId').value;
            const newTitle = document.getElementById('editTitle').value.trim();
            const newDesc = document.getElementById('editDesc').value.trim();
            if (!newTitle || !newDesc) { showToast('يرجى ملء جميع الحقول! ⚠️'); return; }
            const video = videosData.find(v => v.id === videoId);
            if (!video || !video.firebaseKey) return;

            try {
                await fetch(`${FIREBASE_URL}/videos/${video.firebaseKey}.json`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle, description: newDesc })
                });
                video.title = newTitle;
                video.description = newDesc;
                closeEditModal();
                renderVideos(document.getElementById('searchInput').value);
                showToast('تم تعديل المقطع بنجاح! ✅');
            } catch(e) {
                showToast('فشل التعديل! ⚠️');
            }
        }

        async function deleteVideo(videoId, event) {
            event.stopPropagation();
            if (!confirm('هل أنت متأكد من حذف هذا المقطع؟')) return;
            const video = videosData.find(v => v.id === videoId);
            if (!video || !video.firebaseKey) return;

            try {
                await fetch(`${FIREBASE_URL}/videos/${video.firebaseKey}.json`, { method: 'DELETE' });
                videosData = videosData.filter(v => v.id !== videoId);
                renderVideos(document.getElementById('searchInput').value);
                showToast('تم حذف المقطع بنجاح! 🗑');
            } catch(e) {
                showToast('فشل الحذف! ⚠️');
            }
        }

        // Settings Modal
        function openSettingsModal() {
            const username = localStorage.getItem('username') || '-';
            const role = localStorage.getItem('userRole') || 'member';
            document.getElementById('settingsUsername').textContent = username;
            const badge = document.getElementById('settingsRoleBadge');
            badge.textContent = role === 'admin' ? '👑 أدمن' : '👤 عضو';
            badge.className = 'user-badge ' + (role === 'admin' ? 'admin' : 'member');
            switchTab('name');
            document.getElementById('settingsModal').classList.add('active');
        }

        function switchTab(tab) {
            ['name','pass','danger'].forEach(t => {
                document.getElementById('tabContent-' + t).style.display = t === tab ? 'block' : 'none';
                const btn = document.getElementById('tab-' + t);
                if (t === tab) {
                    btn.style.background = 'rgba(108,92,231,0.2)';
                    btn.style.color = '#a29bfe';
                    btn.style.border = '1px solid rgba(108,92,231,0.4)';
                } else {
                    btn.style.background = 'transparent';
                    btn.style.color = '#718096';
                    btn.style.border = '1px solid rgba(45,55,72,1)';
                }
            });
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
            document.getElementById('newUsername').value = '';
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
        }

        async function changeUsername() {
            const newName = document.getElementById('newUsername').value.trim();
            if (!newName) { showToast('أدخل الاسم الجديد! ⚠️'); return; }
            const currentName = localStorage.getItem('username');

            try {
                // جلب البيانات ودور على الاسم الحالي
                const res = await fetch('https://habbo-login-default-rtdb.firebaseio.com/members.json');
                const data = await res.json();
                let userKey = null;
                for (const key in data) {
                    if (data[key].character && data[key].character.toLowerCase() === currentName.toLowerCase()) {
                        userKey = key;
                        break;
                    }
                }
                if (!userKey) { showToast('لم يتم العثور على الحساب! ⚠️'); return; }

                // تحديث الاسم
                await fetch(`https://habbo-login-default-rtdb.firebaseio.com/members/${userKey}/character.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newName)
                });

                localStorage.setItem('username', newName);
                document.getElementById('settingsUsername').textContent = newName;
                document.getElementById('newUsername').value = '';
                showToast('تم تغيير الاسم بنجاح! ✅');
            } catch(e) {
                showToast('حدث خطأ! ⚠️');
            }
        }

        async function changePassword() {
            const currentPass = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value.trim();
            if (!currentPass || !newPass) { showToast('أدخل كلمة المرور الحالية والجديدة! ⚠️'); return; }
            if (newPass.length < 3) { showToast('كلمة المرور قصيرة جداً! ⚠️'); return; }
            const currentName = localStorage.getItem('username');

            try {
                const res = await fetch('https://habbo-login-default-rtdb.firebaseio.com/members.json');
                const data = await res.json();
                let userKey = null;
                let userPass = null;
                for (const key in data) {
                    if (data[key].character && data[key].character.toLowerCase() === currentName.toLowerCase()) {
                        userKey = key;
                        userPass = data[key].password;
                        break;
                    }
                }
                if (!userKey) { showToast('لم يتم العثور على الحساب! ⚠️'); return; }
                if (userPass !== currentPass) { showToast('كلمة المرور الحالية غير صحيحة! ⚠️'); return; }

                await fetch(`https://habbo-login-default-rtdb.firebaseio.com/members/${userKey}/password.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newPass)
                });

                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                showToast('تم تغيير كلمة المرور بنجاح! ✅');
            } catch(e) {
                showToast('حدث خطأ! ⚠️');
            }
        }

        async function deleteAccount() {
            if (!confirm('هل أنت متأكد من حذف حسابك نهائياً؟ لا يمكن التراجع عن هذا الإجراء!')) return;
            const currentName = localStorage.getItem('username');

            try {
                const res = await fetch('https://habbo-login-default-rtdb.firebaseio.com/members.json');
                const data = await res.json();
                let userKey = null;
                for (const key in data) {
                    if (data[key].character && data[key].character.toLowerCase() === currentName.toLowerCase()) {
                        userKey = key;
                        break;
                    }
                }
                if (!userKey) { showToast('لم يتم العثور على الحساب! ⚠️'); return; }

                await fetch(`https://habbo-login-default-rtdb.firebaseio.com/members/${userKey}.json`, {
                    method: 'DELETE'
                });

                showToast('تم حذف الحساب. جاري التوجيه...');
                localStorage.clear();
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } catch(e) {
                showToast('حدث خطأ! ⚠️');
            }
        }

        // Logout logic
        function handleLogout() {
            showToast('تم تسجيل الخروج بنجاح! جاري التوجيه...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        // Custom premium Toast Notification
        function showToast(message) {
            const oldToast = document.querySelector('.custom-toast');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(30, 30, 60, 0.95);border:1px solid #6c5ce7;padding:12px 24px;border-radius:15px;color:white;font-weight:bold;z-index:99999;box-shadow:0 10px 30px rgba(0, 0, 0, 0.5);animation:fadeInUp 0.3s ease-out;backdrop-filter:blur(5px);';
            toast.textContent = message;
            document.body.appendChild(toast);

            const style = document.createElement('style');
            style.className = 'toast-style';
            style.textContent = '@keyframes fadeInUp{from{transform:translate(-50%, 50px);opacity:0}to{transform:translate(-50%, 0);opacity:1}}';
            document.head.appendChild(style);

            setTimeout(() => {
                toast.style.animation = 'fadeOutDown 0.3s ease-in forwards';
                const style2 = document.createElement('style');
                style2.textContent = '@keyframes fadeOutDown{from{transform:translate(-50%, 0);opacity:1}to{transform:translate(-50%, 50px);opacity:0}}';
                document.head.appendChild(style2);
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 2500);
        }

        // Initial setup and render check
        window.addEventListener('DOMContentLoaded', async () => {
            await initVideos();
            
            // Check for search query parameter
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            if (query) {
                document.getElementById('searchInput').value = query;
                renderVideos(query);
            }

            // Set role permissions
            const userRole = localStorage.getItem('userRole');
            const adminBtn = document.getElementById('adminBtn');
            if (userRole === 'admin' && adminBtn) {
                adminBtn.style.display = 'flex';
                document.getElementById('videoFeed').classList.add('admin-mode');
            }
        });
    </script>
</body>
</html>
